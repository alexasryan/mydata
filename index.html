<script>
(function(){
'use strict';

/* ============ КОНФИГУРАЦИЯ SUPABASE (вставьте свои значения) ============ */
const SUPABASE_URL = "https://irzaljzhrocfphfimpdk.supabase.co";       // например https://abcd.supabase.co
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyemFsanpocm9jZnBoZmltcGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1Mzg1NjUsImV4cCI6MjA5ODExNDU2NX0.Pb62oHJamqPesy32rFw-2iPJMF_ZjdmnM70ebEKj0C0";          // anon public key
const EMAIL_DOMAIN = "personal.db";             // не менять
/* ===================================================================== */

if (SUPABASE_URL.includes('PASTE_')) {
  alert('Откройте файл и вставьте SUPABASE_URL и SUPABASE_KEY в начале скрипта.');
}
const sb = (window.supabase) ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  : { auth:{}, from:()=>{}, channel:()=>({on:()=>({subscribe(){}})}) };

/* ===== УТИЛИТЫ ===== */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const uuid = ()=>crypto.randomUUID();
const nowISO = ()=>new Date().toISOString();
const escapeHtml = s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtDate(iso){const d=new Date(iso),n=new Date();if(d.toDateString()===n.toDateString())return d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});const o={day:'numeric',month:'short'};if(d.getFullYear()!==n.getFullYear())o.year='numeric';return d.toLocaleDateString('ru-RU',o);}
function fmtDateFull(iso){return new Date(iso).toLocaleString('ru-RU',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtMoney(n){n=Number(n)||0;return n.toLocaleString('ru-RU',{maximumFractionDigits:0})+' ₽';}
function fmtBytes(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(1)+' GB';}
function stripMd(md){return String(md||'').replace(/!\[[^\]]*\]\([^)]*\)/g,'').replace(/\[([^\]]*)\]\([^)]*\)/g,'$1').replace(/```[\s\S]*?```/g,' ').replace(/[#>*_`~\-|]/g,' ').replace(/\s+/g,' ').trim();}
function initials(n){const s=String(n||'?').trim();return s?s.charAt(0).toUpperCase():'?';}
function ext(name){const m=String(name||'').match(/\.([a-z0-9]+)$/i);return m?m[1].toLowerCase():'';}
const usernameToEmail = u=>u.trim().toLowerCase()+'@'+EMAIL_DOMAIN;
/* ===== СОСТОЯНИЕ ===== */
const state = {
  user: null, view: 'dashboard',
  notesSearch: '', financeChart: null, dashChart: null,
  currencies: {}, currentFolder: { notes:null, media:null, finance:null },
  realtime: null,
};

/* ===== TOAST ===== */
function toast(m,t='default'){const c={default:'bg-[#1d1d1f] text-white',success:'bg-[#34C759] text-white',error:'bg-[#FF3B30] text-white'}[t]||'bg-[#1d1d1f] text-white';const el=document.createElement('div');el.className=`pointer-events-auto max-w-sm rounded-2xl px-4 py-3 text-sm font-medium shadow-lg toast-in ${c}`;el.textContent=m;$('#toast-root').appendChild(el);setTimeout(()=>{el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='translateY(10px)';setTimeout(()=>el.remove(),300);},2600);}

/* ===== МОДАЛКИ ===== */
function openModal(html,size='md'){const r=$('#modal-root');const w=size==='lg'?'max-w-2xl':size==='sm'?'max-w-sm':'max-w-md';r.innerHTML=`<div class="absolute inset-0 bg-black/30 backdrop-blur-sm fade-in" data-close></div><div class="card relative w-full ${w} max-h-[90vh] overflow-hidden pop-in flex flex-col">${html}</div>`;r.classList.remove('hidden');r.classList.add('flex');const close=()=>{r.classList.add('hidden');r.classList.remove('flex');r.innerHTML='';};r.querySelectorAll('[data-close]').forEach(e=>e.addEventListener('click',close));document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',esc);}});r._close=close;return r;}
function closeModal(){const r=$('#modal-root');if(r&&r._close)r._close();}
function confirmDialog({title='Подтвердите',message='',confirmText='Удалить',danger=true}){return new Promise(res=>{openModal(`<div class="p-6 text-center"><div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full ${danger?'bg-[#FF3B30]/10':'bg-accent/10'}">${danger?'<svg viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'}</div><h3 class="text-base font-semibold">${escapeHtml(title)}</h3><p class="mt-1.5 text-sm text-gray-500">${escapeHtml(message)}</p></div><div class="grid grid-cols-2 gap-2 p-4 border-t border-black/5"><button class="btn btn-ghost" data-action="cancel">Отмена</button><button class="btn ${danger?'btn-danger':'btn-primary'}" data-action="confirm">${escapeHtml(confirmText)}</button></div>`,'sm');const r=$('#modal-root');r.querySelector('[data-action="cancel"]').addEventListener('click',()=>{closeModal();res(false);});r.querySelector('[data-action="confirm"]').addEventListener('click',()=>{closeModal();res(true);});});}

/* ===== AUTH (Supabase) ===== */
const ADMIN_USERNAME='asryanalex', ADMIN_PASSWORD='BAZA2005';
async function ensureAdmin(){
  try{
    const { data } = await sb.from('profiles').select('id').eq('username',ADMIN_USERNAME).maybeSingle();
    if (data) return;
    const { data: authData, error } = await sb.auth.signUp({ email: usernameToEmail(ADMIN_USERNAME), password: ADMIN_PASSWORD });
    if (error) { if (!String(error.message).includes('already')) console.warn('admin signup', error.message); }
    if (authData && authData.user) {
      await sb.from('profiles').insert({ id: authData.user.id, username: ADMIN_USERNAME, name:'Administrator', role:'admin' });
      await seedCategories(authData.user.id);
      await sb.auth.signOut();
    }
  }catch(e){console.warn('ensureAdmin',e);}
}
async function doLogin(username, password){
  const uname=username.trim().toLowerCase();
  const { data, error } = await sb.auth.signInWithPassword({ email: usernameToEmail(uname), password });
  if (error){ const m=String(error.message).toLowerCase(); if(m.includes('not confirmed'))return{ok:false,error:'Подтвердите email в настройках Supabase'}; if(m.includes('invalid'))return{ok:false,error:'Неверный логин или пароль'}; return{ok:false,error:error.message}; }
  const profile = await sb.from('profiles').select('*').eq('id', data.user.id).maybeSingle();
  if (!profile.data){ await sb.auth.signOut(); return { ok:false, error:'Профиль не найден' }; }
  state.user = { id: data.user.id, username: profile.data.username, name: profile.data.name, role: profile.data.role };
  await seedCategoriesIfEmpty(data.user.id);
  showApp();
  return { ok:true };
}
async function doRegister(name, username, password){
  const uname=username.trim().toLowerCase();
  if (uname.length<3) return { ok:false, error:'Логин минимум 3 символа' };
  if (password.length<4) return { ok:false, error:'Пароль минимум 4 символа' };
  const { data:exist } = await sb.from('profiles').select('id').eq('username',uname).maybeSingle();
  if (exist) return { ok:false, error:'Логин уже занят' };
  const { data, error } = await sb.auth.signUp({ email: usernameToEmail(uname), password });
  if (error) return { ok:false, error:error.message };
  if (!data.user) return { ok:false, error:'Не удалось создать' };
  await sb.from('profiles').insert({ id: data.user.id, username: uname, name: name.trim()||uname, role:'user' });
  await seedCategories(data.user.id);
  state.user = { id: data.user.id, username: uname, name: name.trim()||uname, role:'user' };
  showApp();
  return { ok:true };
}
async function restoreSession(){
  try{
    const { data } = await sb.auth.getSession();
    if (!data.session || !data.session.user) return false;
    const p = await sb.from('profiles').select('*').eq('id', data.session.user.id).maybeSingle();
    if (!p.data) return false;

/* ===== КУРСЫ ВАЛЮТ ЦБ РФ ===== */
async function loadCurrencies(){
  try{
    const today=new Date(); let rates=null;
    for(let i=0;i<5;i++){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const dd=String(d.getDate()).padStart(2,'0'), mm=String(d.getMonth()+1).padStart(2,'0'), yyyy=d.getFullYear();
      const url=`https://www.cbr-xml-daily.ru/archive/${yyyy}/${mm}/${dd}/daily_json.js`;
      try{ const r=await fetch(url); if(r.ok){ rates=await r.json(); break; } }catch(e){}
    }
    if(!rates){ const r=await fetch('https://www.cbr-xml-daily.ru/daily_json.js'); rates=await r.json(); }
    const v=rates.Valute;
    state.currencies = {
      date: rates.Date,
      USD: { rate:v.USD.Value, prev:v.USD.Previous, nominal:v.USD.Nominal },
      EUR: { rate:v.EUR.Value, prev:v.EUR.Previous, nominal:v.EUR.Nominal },
      CNY: { rate:v.CNY.Value, prev:v.CNY.Previous, nominal:v.CNY.Nominal },
    };
    renderCurrencyBar();
  }catch(e){ console.warn('currency',e); }
}
function renderCurrencyBar(){
  const bar=$('#currency-bar'); if(!bar)return;
  const c=state.currencies; if(!c.USD){ bar.innerHTML=''; return; }
  const chip=(code,d)=>{ const diff=d.rate-d.prev; const up=diff>=0; const arrow=up?'▲':'▼'; const col=up?'text-[#34C759]':'text-[#FF3B30]'; return `<div class="flex items-center gap-1.5"><span class="font-semibold text-ink">${code}</span><span>${d.rate.toFixed(2)}₽</span><span class="${col} text-[10px]">${arrow} ${Math.abs(diff).toFixed(2)}</span></div>`; };
  bar.innerHTML = `<div class="hidden md:flex items-center gap-3">${chip('USD',c.USD)}${chip('EUR',c.EUR)}${chip('CNY',c.CNY)}</div>`;
}

const IMG_EXT=['jpg','jpeg','png','gif','webp','svg','bmp','ico','avif'];
function isImageType(type,name){return (type&&type.startsWith('image/'))||IMG_EXT.includes(ext(name));}
function fileIcon(name){
  const e=ext(name);
  if(['pdf'].includes(e))return{c:'#FF3B30',s:'PDF'};
  if(['doc','docx','rtf'].includes(e))return{c:'#007AFF',s:'DOC'};
  if(['xls','xlsx','csv'].includes(e))return{c:'#34C759',s:'XLS'};
  if(['zip','rar','7z','tar','gz'].includes(e))return{c:'#8E8E93',s:'ZIP'};
  if(['mp4','mov','avi','mkv','webm'].includes(e))return{c:'#AF52DE',s:'VID'};
  if(['mp3','wav','flac','ogg','m4a'].includes(e))return{c:'#FF9500',s:'AUD'};
  if(['txt','md'].includes(e))return{c:'#6e6e73',s:'TXT'};
  if(IMG_EXT.includes(e))return{c:'#5856D6',s:'IMG'};
  return{c:'#8E8E93',s:e?e.slice(0,3).toUpperCase():'FILE'};
}

  wireFolders($('#media-folder-row'),'media',()=>renderMedia());
  $('#media-input').addEventListener('change',async e=>{const files=Array.from(e.target.files||[]);if(!files.length)return;let count=0;for(const file of files){const rec={id:uuid(),user_id:state.user.id,folder_id:fid==='root'?null:(fid||null),filename:file.name,type:file.type,size:file.size,storage_path:'',created_at:nowISO()};try{await Media.upload(file,rec);count++;}catch(err){console.warn(err);toast('Ошибка: '+file.name,'error');}}e.target.value='';if(count){toast(`Загружено: ${count}`,'success');}});
  view.querySelectorAll('[data-preview]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();const full=await Media.get(b.dataset.preview);if(full)openMediaPreview(full);}));
  view.querySelectorAll('[data-del-media]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();const ok=await confirmDialog({title:'Удалить файл?',message:'Файл удалится безвозвратно.'});if(!ok)return;const m=await Media.get(b.dataset.delMedia);if(m&&m.storage_path){try{await sb.storage.from('media').remove([m.storage_path]);}catch(e){}}await Media.remove(b.dataset.delMedia);toast('Удалено','success');}));
}
function openMediaPreview(m){
  const url=Media.url(m.storage_path);
  const img=isImageType(m.type,m.filename);
  const ic=fileIcon(m.filename);
  openModal(`<div class="flex items-center justify-between px-5 h-14 border-b border-black/5"><div class="min-w-0"><h3 class="truncate font-semibold tracking-tight">${escapeHtml(m.filename)}</h3><p class="text-xs text-gray-400">${fmtBytes(m.size)} · ${fmtDateFull(m.created_at)}</p></div><button class="btn btn-ghost !p-2" data-close><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div><div class="bg-black/[0.03] p-4 flex items-center justify-center" style="max-height:70vh">${img?`<img src="${url}" alt="${escapeHtml(m.filename)}" class="max-w-full max-h-[60vh] rounded-xl object-contain" />`:`<div class="text-center" style="color:${ic.c}"><div class="text-2xl font-bold px-3 py-2 rounded-xl mb-3 inline-block" style="background:${ic.c}22">${ic.s}</div><p class="text-sm text-gray-500 mb-2">Предпросмотр недоступен для этого типа</p></div>`}</div><div class="grid grid-cols-2 gap-2 p-4 border-t border-black/5"><a href="${url}" download="${encodeURIComponent(m.filename)}" target="_blank" class="btn btn-primary">Скачать</a><button class="btn btn-ghost" data-close>Закрыть</button></div>`,'lg');
}

/* ===== НАВИГАЦИЯ ===== */
function setupNav(){
  $$('.nav-item').forEach(btn=>btn.addEventListener('click',()=>switchView(btn.dataset.view)));
  $('#menu-btn').addEventListener('click',openMobileSidebar);
  $('#sidebar-overlay').addEventListener('click',closeMobileSidebar);
}

/* ===== ЗАПУСК ===== */
async function boot(){
  setupAuthScreen();
  setupNav();
  try{
    if(!window.supabase){throw new Error('no supabase');}
    await ensureAdmin();
    const restored=await restoreSession();
    if(restored){showApp();}
    else{$('#auth-screen').classList.remove('hidden');}
  }catch(e){
    console.error(e);
    const banner=document.createElement('div');
    banner.className='mt-4 rounded-2xl bg-[#FF3B30]/10 px-4 py-3 text-center text-sm text-[#FF3B30]';
    banner.textContent='Не удалось подключиться к Supabase. Проверьте, что в начале файла вставлены SUPABASE_URL и SUPABASE_KEY, и что интернет работает.';
    $('#auth-screen').querySelector('.max-w-sm').appendChild(banner);
  }
}
document.addEventListener('DOMContentLoaded',boot);

})();
</script>
</body>
</html>
