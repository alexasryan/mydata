<script>
(function () {
'use strict';

/* =====================================================================
   DOM & FORMAT UTILS
===================================================================== */
const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const uuid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));
const nowISO = () => new Date().toISOString();

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

function fmtDate(iso) {
  const d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  const opts = { day: 'numeric', month: 'short' };
  if (d.getFullYear() !== now.getFullYear()) opts.year = 'numeric';
  return d.toLocaleDateString('ru-RU', opts);
}
function fmtDateFull(iso) {
  return new Date(iso).toLocaleString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function fmtMoney(n) {
  n = Number(n) || 0;
  return '₽ ' + n.toLocaleString('ru-RU', { maximumFractionDigits: 0 });
}
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(1) + ' GB';
}
function stripMd(md) {
  return String(md || '')
    .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
    .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
    .replace(/```[\s\S]*?```/g, ' ')
    .replace(/[#>*_`~\-|]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function initials(name) {
  const n = String(name || '?').trim();
  return n ? n.charAt(0).toUpperCase() : '?';
}

/* =====================================================================
   CRYPTO / PASSWORD  (Web Crypto — PBKDF2)
===================================================================== */
function bytesToHex(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}
function hexToBytes(hex) {
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.substr(i * 2, 2), 16);
  return arr;
}
async function hashPassword(password, saltHex) {
  const salt = saltHex ? hexToBytes(saltHex) : crypto.getRandomValues(new Uint8Array(16));
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial, 256
  );
  return { hash: bytesToHex(new Uint8Array(bits)), salt: bytesToHex(salt) };
}
async function verifyPassword(password, stored) {
  if (!stored || !stored.hash || !stored.salt) return false;
  const { hash } = await hashPassword(password, stored.salt);
  return hash === stored.hash;
}

/* =====================================================================
   INDEXEDDB LAYER
===================================================================== */
const DB = (() => {
  let _db = null;
  const DB_NAME = 'personalDB';
  const DB_VERSION = 1;

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains('users')) {
          const s = db.createObjectStore('users', { keyPath: 'id' });
          s.createIndex('username', 'username', { unique: true });
        }
        if (!db.objectStoreNames.contains('notes')) {
          const s = db.createObjectStore('notes', { keyPath: 'id' });
          s.createIndex('userId', 'userId');
          s.createIndex('updatedAt', 'updatedAt');
        }
        if (!db.objectStoreNames.contains('expenses')) {
          const s = db.createObjectStore('expenses', { keyPath: 'id' });
          s.createIndex('userId', 'userId');
          s.createIndex('date', 'date');
        }
        if (!db.objectStoreNames.contains('media')) {
          const s = db.createObjectStore('media', { keyPath: 'id' });
          s.createIndex('userId', 'userId');
          s.createIndex('createdAt', 'createdAt');
        }
        if (!db.objectStoreNames.contains('categories')) {
          const s = db.createObjectStore('categories', { keyPath: 'id' });
          s.createIndex('userId', 'userId');
        }
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
  }
  async function ensure() { if (!_db) _db = await open(); return _db; }
  function store(name, mode = 'readonly') { return _db.transaction(name, mode).objectStore(name); }
  function asPromise(request) {
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }
  async function put(name, value) { await ensure(); return asPromise(store(name, 'readwrite').put(value)); }
  async function get(name, key) { await ensure(); return asPromise(store(name).get(key)); }
  async function del(name, key) { await ensure(); return asPromise(store(name, 'readwrite').delete(key)); }
  async function all(name) { await ensure(); return asPromise(store(name).getAll()); }
  async function byIndex(name, index, value) { await ensure(); return asPromise(store(name).index(index).getAll(value)); }
  return { open, ensure, put, get, del, all, byIndex };
})();

/* =====================================================================
   DATA ACCESS
===================================================================== */
const Users = {
  findByUsername: (u) => DB.byIndex('users', 'username', u).then(a => a[0] || null),
  get: (id) => DB.get('users', id),
  create: (u) => DB.put('users', u),
};

const Notes = {
  list: () => DB.byIndex('notes', 'userId', state.user.id)
    .then(a => a.sort((x, y) => (y.pinned - x.pinned) || y.updatedAt.localeCompare(x.updatedAt))),
  get: (id) => DB.get('notes', id),
  save: (n) => DB.put('notes', n),
  remove: (id) => DB.del('notes', id),
};

const Expenses = {
  list: () => DB.byIndex('expenses', 'userId', state.user.id)
    .then(a => a.sort((x, y) => y.date.localeCompare(x.date))),
  save: (e) => DB.put('expenses', e),
  remove: (id) => DB.del('expenses', id),
};

const Categories = {
  list: () => DB.byIndex('categories', 'userId', state.user.id)
    .then(a => a.sort((x, y) => x.name.localeCompare(y.name))),
  save: (c) => DB.put('categories', c),
  remove: (id) => DB.del('categories', id),
};

const Media = {
  list: () => DB.byIndex('media', 'userId', state.user.id)
    .then(a => a.sort((x, y) => y.createdAt.localeCompare(x.createdAt))),
  get: (id) => DB.get('media', id),
  save: (m) => DB.put('media', m),
  remove: (id) => DB.del('media', id),
};

const DEFAULT_CATEGORIES = [
  { name: 'Еда',          icon: '🍽️', color: '#FF9500' },
  { name: 'Транспорт',    icon: '🚗', color: '#5856D6' },
  { name: 'Покупки',      icon: '🛍️', color: '#FF2D55' },
  { name: 'Развлечения',  icon: '🎬', color: '#34C759' },
  { name: 'Здоровье',     icon: '💊', color: '#007AFF' },
  { name: 'Жильё',        icon: '🏠', color: '#AF52DE' },
  { name: 'Другое',       icon: '📦', color: '#8E8E93' },
];
async function seedCategories(userId) {
  for (const c of DEFAULT_CATEGORIES) {
    await DB.put('categories', { id: uuid(), userId, name: c.name, icon: c.icon, color: c.color });
  }
}

/* =====================================================================
   APP STATE
===================================================================== */
const state = {
  user: null,
  view: 'dashboard',
  notesSearch: '',
  financeChart: null,
  mediaObjectUrls: [],   // для освобождения памяти
};

/* =====================================================================
   TOAST
===================================================================== */
function toast(message, type = 'default') {
  const root = $('#toast-root');
  const colors = {
    default: 'bg-[#1d1d1f] text-white',
    success: 'bg-[#34C759] text-white',
    error:   'bg-[#FF3B30] text-white',
  };
  const el = document.createElement('div');
  el.className = `pointer-events-auto max-w-sm rounded-2xl px-4 py-3 text-sm font-medium shadow-lg toast-in ${colors[type] || colors.default}`;
  el.textContent = message;
  root.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s, transform .3s';
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    setTimeout(() => el.remove(), 300);
  }, 2600);
}

/* =====================================================================
   MODAL
===================================================================== */
function openModal(contentHTML, size = 'md') {
  const root = $('#modal-root');
  const width = size === 'lg' ? 'max-w-2xl' : size === 'sm' ? 'max-w-sm' : 'max-w-md';
  root.innerHTML =
    `<div class="absolute inset-0 bg-black/30 backdrop-blur-sm fade-in" data-close></div>
     <div class="card relative w-full ${width} max-h-[90vh] overflow-hidden pop-in flex flex-col">
       ${contentHTML}
     </div>`;
  root.classList.remove('hidden');
  root.classList.add('flex');
  const close = () => {
    root.classList.add('hidden');
    root.classList.remove('flex');
    root.innerHTML = '';
  };
  root.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', close));
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
  });
  root._close = close;
  return root;
}
function closeModal() { const r = $('#modal-root'); if (r && r._close) r._close(); }

function confirmDialog({ title = 'Подтвердите', message = '', confirmText = 'Удалить', danger = true }) {
  return new Promise(resolve => {
    openModal(`
      <div class="p-6 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full ${danger ? 'bg-[#FF3B30]/10' : 'bg-accent/10'}">
          ${danger
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="#FF3B30" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>'}
        </div>
        <h3 class="text-base font-semibold">${escapeHtml(title)}</h3>
        <p class="mt-1.5 text-sm text-gray-500">${escapeHtml(message)}</p>
      </div>
      <div class="grid grid-cols-2 gap-2 p-4 border-t border-black/5">
        <button class="btn btn-ghost" data-action="cancel">Отмена</button>
        <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" data-action="confirm">${escapeHtml(confirmText)}</button>
      </div>
    `, 'sm');
    const root = $('#modal-root');
    root.querySelector('[data-action="cancel"]').addEventListener('click', () => { closeModal(); resolve(false); });
    root.querySelector('[data-action="confirm"]').addEventListener('click', () => { closeModal(); resolve(true); });
  });
}

/* =====================================================================
   AUTH
===================================================================== */
const SESSION_KEY = 'pd_session';

async function ensureAdmin() {
  const existing = await Users.findByUsername('asryanalex');
  if (existing) return;
  const { hash, salt } = await hashPassword('BAZA2005');
  const admin = {
    id: uuid(),
    username: 'asryanalex',
    name: 'Administrator',
    role: 'ADMIN',
    pwd: { hash, salt },
    createdAt: nowISO(),
  };
  await Users.create(admin);
  await seedCategories(admin.id);
}

async function doLogin(username, password) {
  const user = await Users.findByUsername(username.trim().toLowerCase());
  if (!user) return { ok: false, error: 'Пользователь не найден' };
  const valid = await verifyPassword(password, user.pwd);
  if (!valid) return { ok: false, error: 'Неверный пароль' };
  await startSession(user);
  return { ok: true };
}

async function doRegister(name, username, password) {
  const uname = username.trim().toLowerCase();
  if (uname.length < 3) return { ok: false, error: 'Логин минимум 3 символа' };
  if (password.length < 4) return { ok: false, error: 'Пароль минимум 4 символа' };
  if (await Users.findByUsername(uname)) return { ok: false, error: 'Логин уже занят' };
  const { hash, salt } = await hashPassword(password);
  const user = {
    id: uuid(),
    username: uname,
    name: name.trim() || uname,
    role: 'USER',
    pwd: { hash, salt },
    createdAt: nowISO(),
  };
  await Users.create(user);
  await seedCategories(user.id);
  await startSession(user);
  return { ok: true };
}

async function startSession(user) {
  state.user = { id: user.id, username: user.username, name: user.name, role: user.role };
  localStorage.setItem(SESSION_KEY, user.id);
  showApp();
}

async function restoreSession() {
  const id = localStorage.getItem(SESSION_KEY);
  if (!id) return false;
  const user = await Users.get(id);
  if (!user) { localStorage.removeItem(SESSION_KEY); return false; }
  state.user = { id: user.id, username: user.username, name: user.name, role: user.role };
  return true;
}

function logout() {
  // освобождаем object URLs
  state.mediaObjectUrls.forEach(u => URL.revokeObjectURL(u));
  state.mediaObjectUrls = [];
  if (state.financeChart) { state.financeChart.destroy(); state.financeChart = null; }
  state.user = null;
  localStorage.removeItem(SESSION_KEY);
  $('#app').classList.add('hidden');
  $('#auth-screen').classList.remove('hidden');
  $('#auth-screen').classList.add('fade-in');
  $('#login-form').reset();
  $('#register-form').reset();
}

function showApp() {
  $('#auth-screen').classList.add('hidden');
  $('#app').classList.remove('hidden');
  updateProfileUI();
  switchView('dashboard');
}

function updateProfileUI() {
  const u = state.user;
  $('#sidebar-name').textContent = u.name;
  $('#sidebar-username').textContent = '@' + u.username;
  $('#sidebar-avatar').textContent = initials(u.name);
  const badge = $('#sidebar-badge');
  if (u.role === 'ADMIN') badge.classList.remove('hidden'); else badge.classList.add('hidden');
}

function setupAuthScreen() {
  const tabLogin = $('#tab-login'), tabReg = $('#tab-register');
  const formLogin = $('#login-form'), formReg = $('#register-form');
  const showLogin = () => {
    tabLogin.classList.add('bg-white', 'shadow-sm', 'text-ink');
    tabLogin.classList.remove('text-gray-500');
    tabReg.classList.remove('bg-white', 'shadow-sm', 'text-ink');
    tabReg.classList.add('text-gray-500');
    formLogin.classList.remove('hidden'); formReg.classList.add('hidden');
  };
  const showReg = () => {
    tabReg.classList.add('bg-white', 'shadow-sm', 'text-ink');
    tabReg.classList.remove('text-gray-500');
    tabLogin.classList.remove('bg-white', 'shadow-sm', 'text-ink');
    tabLogin.classList.add('text-gray-500');
    formReg.classList.remove('hidden'); formLogin.classList.add('hidden');
  };
  tabLogin.addEventListener('click', showLogin);
  tabReg.addEventListener('click', showReg);

  formLogin.addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = $('#login-error');
    err.classList.add('hidden');
    const btn = formLogin.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Вход…';
    const res = await doLogin($('#login-username').value, $('#login-password').value);
    btn.disabled = false; btn.textContent = 'Войти';
    if (!res.ok) { err.textContent = res.error; err.classList.remove('hidden'); return; }
    toast('С возвращением!', 'success');
  });

  formReg.addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = $('#register-error');
    err.classList.add('hidden');
    const btn = formReg.querySelector('button[type="submit"]');
    btn.disabled = true; btn.textContent = 'Создание…';
    const res = await doRegister($('#reg-name').value, $('#reg-username').value, $('#reg-password').value);
    btn.disabled = false; btn.textContent = 'Создать аккаунт';
    if (!res.ok) { err.textContent = res.error; err.classList.remove('hidden'); return; }
    toast('Аккаунт создан', 'success');
  });

  $('#logout-btn').addEventListener('click', () => logout());
}

function statCard({ label, value, sub, subAccent }) {
  return `<div class="card p-5">
    <p class="text-xs font-medium text-gray-500">${label}</p>
    <p class="mt-2 text-2xl font-semibold tracking-tight">${value}</p>
    ${sub ? `<p class="mt-1 text-xs ${subAccent ? 'text-accent' : 'text-gray-400'}">${sub}</p>` : ''}
  </div>`;
}

async function renderDashboard() {
  const view = $('#view-dashboard');
  view.innerHTML = `<div class="flex items-center justify-center py-20 text-sm text-gray-400">Загрузка…</div>`;

  const [notes, media, expenses, categories] = await Promise.all([
    Notes.list(), Media.list(), Expenses.list(), Categories.list()
  ]);
  const catMap = {};
  categories.forEach(c => catMap[c.name] = c);

  const now = new Date();
  const monthExpenses = expenses.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const monthTotal = monthExpenses.reduce((s, e) => s + Number(e.amount), 0);
  const totalSpent = expenses.reduce((s, e) => s + Number(e.amount), 0);

  // группировка по категориям (за месяц)
  const byCat = {};
  monthExpenses.forEach(e => {
    const k = e.category || 'Другое';
    byCat[k] = (byCat[k] || 0) + Number(e.amount);
  });

  const recentNotes = notes.slice(0, 4);
  const recentMedia = media.filter(m => m.type && m.type.startsWith('image/')).slice(0, 6);

  const isAdmin = state.user.role === 'ADMIN';
  const hour = now.getHours();
  const greet = hour < 6 ? 'Доброй ночи' : hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';

  view.innerHTML = `
    <div class="slide-up">
      <div class="flex flex-wrap items-center gap-2 mb-1">
        <h1 class="text-2xl font-semibold tracking-tight">${greet}, ${escapeHtml(state.user.name)}</h1>
        ${isAdmin ? '<span class="chip bg-accent/10 text-accent">ADMIN</span>' : ''}
      </div>
      <p class="text-sm text-gray-500">${now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 slide-up" style="animation-delay:.03s">
      ${statCard({ label: 'Расходы за месяц', value: fmtMoney(monthTotal) })}
      ${statCard({ label: 'Всего расходов', value: fmtMoney(totalSpent) })}
      ${statCard({ label: 'Заметки', value: notes.length })}
      ${statCard({ label: 'Файлы', value: media.length })}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Chart -->
      <div class="card p-5 lg:col-span-2 slide-up" style="animation-delay:.06s">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-medium text-gray-500">Расходы по категориям</h2>
          <span class="text-xs text-gray-400">${now.toLocaleDateString('ru-RU', { month: 'long' })}</span>
        </div>
        ${Object.keys(byCat).length
          ? `<div class="relative h-64"><canvas id="dash-chart"></canvas></div>
             <div class="mt-4 grid grid-cols-2 sm:grid-cols-3 gap-2">
               ${Object.entries(byCat).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
                 <div class="flex items-center gap-2 text-sm">
                   <span class="h-2.5 w-2.5 rounded-full" style="background:${(catMap[k] && catMap[k].color) || '#8E8E93'}"></span>
                   <span class="text-gray-600 truncate">${escapeHtml(k)}</span>
                   <span class="ml-auto font-medium">${fmtMoney(v)}</span>
                 </div>`).join('')}
             </div>`
          : `<div class="h-64 flex flex-col items-center justify-center text-center text-gray-400">
               <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-10 h-10 mb-2 opacity-50"><path d="M21 12a9 9 0 1 1-9-9v9z"/></svg>
               <p class="text-sm">Нет расходов в этом месяце</p>
             </div>`}
      </div>

      <!-- Recent notes -->
      <div class="card p-5 slide-up" style="animation-delay:.09s">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-medium text-gray-500">Последние заметки</h2>
          <button class="text-xs font-medium text-accent" data-goto="notes">Все</button>
        </div>
        ${recentNotes.length
          ? `<ul class="space-y-1">${recentNotes.map(n => `
              <li class="flex items-center gap-3 rounded-xl px-2 py-2 hover:bg-black/[0.03] cursor-pointer" data-note="${n.id}">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-1.5">
                    ${n.pinned ? '<svg viewBox="0 0 24 24" fill="#FF9500" class="w-3.5 h-3.5 shrink-0"><path d="M16 3l5 5-3 1-3 3-1 5-2-2-4 4-1-1 4-4-2-2 5-1 3-3z"/></svg>' : ''}
                  <span class="truncate text-sm font-medium">${escapeHtml(n.title)}</span>
                  </div>
                  <p class="truncate text-xs text-gray-400">${escapeHtml(stripMd(n.content).slice(0, 60)) || 'Без содержимого'}</p>
                </div>
                <span class="text-xs text-gray-400 shrink-0">${fmtDate(n.updatedAt)}</span>
              </li>`).join('')}</ul>`
          : `<div class="py-8 text-center text-sm text-gray-400">Заметок пока нет</div>`}
      </div>
    </div>

    <!-- Media preview -->
    <div class="slide-up" style="animation-delay:.12s">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-medium text-gray-500">Недавние изображения</h2>
        <button class="text-xs font-medium text-accent" data-goto="media">Галерея</button>

                <img alt="" class="h-full w-full object-cover" />
              </div>`).join('')}
          </div>`
        : `<div class="card p-8 text-center text-sm text-gray-400">Изображений пока нет</div>`}
    </div>
  `;

  // загружаем thumbnails
  recentMedia.forEach(async m => {
    const full = await Media.get(m.id);
    if (full && full.blob) {
      const url = URL.createObjectURL(full.blob);
      state.mediaObjectUrls.push(url);
      const img = view.querySelector(`[data-media="${m.id}"] img`);
      if (img) img.src = url;
    }
  });

  // chart
  if (Object.keys(byCat).length) {
    const ctx = $('#dash-chart');
    if (ctx) {
      const entries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: entries.map(e => e[0]),
          datasets: [{
            data: entries.map(e => e[1]),
            backgroundColor: entries.map(e => (catMap[e[0]] && catMap[e[0]].color) || '#8E8E93'),
            borderWidth: 2,
            borderColor: '#ffffff',
            hoverOffset: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '62%',
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1d1d1f', padding: 12, cornerRadius: 12,
              titleFont: { size: 13 }, bodyFont: { size: 13 },
              callbacks: { label: (c) => ' ' + fmtMoney(c.parsed) }

          }
        }
      });

  }

  // wired events
  view.querySelectorAll('[data-goto]').forEach(b => b.addEventListener('click', () => switchView(b.dataset.goto)));
  view.querySelectorAll('[data-note]').forEach(li => li.addEventListener('click', () => { switchView('notes'); setTimeout(() => openNoteEditor(li.dataset.note), 50); }));

    const full = await Media.get(d.dataset.media);
    if (full) openMediaPreview(full);
  }));

    });
  });
  grid.querySelectorAll('[data-action="edit"]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); openNoteEditor(b.dataset.id); }));
  grid.querySelectorAll('[data-action="pin"]').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    const n = await Notes.get(b.dataset.id);
    n.pinned = !n.pinned; n.updatedAt = nowISO();
    await Notes.save(n); renderNotes();
  }));
  grid.querySelectorAll('[data-action="del"]').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ok = await confirmDialog({ title: 'Удалить заметку?', message: 'Это действие нельзя отменить.' });
    if (!ok) return;
    await Notes.remove(b.dataset.id); toast('Заметка удалена', 'success'); renderNotes();
  }));
}

function emptyState(title, message, btnText, onClick) {
  const id = 'empty-' + uuid();
  setTimeout(() => { const b = document.getElementById(id); if (b) b.addEventListener('click', onClick); }, 0);
  return `<div class="col-span-full card p-12 text-center">
    <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-black/[0.04]">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="1.5" class="w-7 h-7"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>
    </div>
    <h3 class="font-semibold">${escapeHtml(title)}</h3>
    <p class="mt-1 text-sm text-gray-500">${escapeHtml(message)}</p>
    <button id="${id}" class="btn btn-primary mt-4">${escapeHtml(btnText)}</button>
  </div>`;
}

function openNoteEditor(noteId) {
  DB.get('notes', noteId).then(async (existing) => {
    const note = existing || {
      id: uuid(), userId: state.user.id, title: '', content: '', tags: [], pinned: false,
      createdAt: nowISO(), updatedAt: nowISO(),
    };
    let mode = 'write'; // write | preview

    openModal(`
      <div class="flex items-center justify-between px-5 h-14 border-b border-black/5">
        <h3 class="font-semibold tracking-tight">${existing ? 'Редактировать' : 'Новая заметка'}</h3>
        <button class="btn btn-ghost !p-2" data-close>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>

      <div class="px-5 pt-4">
        <input id="note-title" class="w-full text-lg font-semibold tracking-tight outline-none placeholder:text-gray-300 bg-transparent" placeholder="Заголовок" value="${escapeHtml(note.title)}" />
      </div>

      <div class="px-5 pt-3">
        <div class="inline-flex rounded-xl bg-black/[0.05] p-1 text-xs font-medium">
          <button class="seg-edit rounded-lg px-3 py-1 bg-white shadow-sm text-ink" data-mode="write">Текст</button>
          <button class="seg-edit rounded-lg px-3 py-1 text-gray-500" data-mode="preview">Просмотр</button>
        </div>
      </div>

      <div class="px-5 py-3 overflow-y-auto" style="min-height:220px;max-height:50vh">
        <div id="note-write">
          <textarea id="note-content" class="w-full resize-none outline-none text-sm leading-relaxed bg-transparent placeholder:text-gray-300" rows="10" placeholder="Пишите здесь… Поддерживается Markdown"># Заголовок

- список
- **жирный**
- [ссылка](https://example.com)</textarea>
        </div>
        <div id="note-preview" class="md hidden text-sm"></div>
      </div>

      <div class="px-5 pb-3">
        <label class="label">Теги (через запятую)</label>
        <input id="note-tags" class="input" placeholder="работа, идеи" value="${escapeHtml((note.tags || []).join(', '))}" />
        <label class="flex items-center gap-2 mt-3 cursor-pointer">
          <input id="note-pinned" type="checkbox" class="rounded accent-[#007AFF]" ${note.pinned ? 'checked' : ''} />
          <span class="text-sm text-gray-600">Закрепить наверху</span>
        </label>
      </div>

      <div class="grid grid-cols-2 gap-2 p-4 border-t border-black/5">
        <button class="btn btn-ghost" data-close>Отмена</button>
        <button id="note-save" class="btn btn-primary">Сохранить</button>
      </div>
    `, 'lg');

    $('#note-content').value = note.content || '';

    const refreshSeg = () => {
      $$('.seg-edit').forEach(b => {
        const active = b.dataset.mode === mode;
        b.classList.toggle('bg-white', active);
        b.classList.toggle('shadow-sm', active);
        b.classList.toggle('text-ink', active);
        b.classList.toggle('text-gray-500', !active);
      });
      $('#note-write').classList.toggle('hidden', mode !== 'write');
      $('#note-preview').classList.toggle('hidden', mode !== 'preview');
      if (mode === 'preview') {
        const raw = $('#note-content').value;
        $('#note-preview').innerHTML = marked.parse(raw || '*Пусто*');
      }
    };
    $$('.seg-edit').forEach(b => b.addEventListener('click', () => { mode = b.dataset.mode; refreshSeg(); }));
    $('#note-content').addEventListener('input', () => { if (mode === 'preview') $('#note-preview').innerHTML = marked.parse($('#note-content').value || '*Пусто*'); });

    $('#note-save').addEventListener('click', async () => {
      const title = $('#note-title').value.trim();
      if (!title) { toast('Введите заголовок', 'error'); return; }
      const tags = $('#note-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const rec = {
        id: note.id, userId: state.user.id,
        title, content: $('#note-content').value, tags,
        pinned: $('#note-pinned').checked,
        createdAt: note.createdAt, updatedAt: nowISO(),
      };
      await Notes.save(rec);
      closeModal();
      toast(existing ? 'Заметка обновлена' : 'Заметка создана', 'success');
      renderNotes();
    });
  });
}

async function renderFinance() {

      <div class="card p-5">

      <div class="card p-5 flex flex-col">
        <p class="text-xs font-medium text-gray-500">Категории</p>

          <button id="manage-categories" class="btn btn-ghost w-full">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            Управление
          </button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4">
      <div class="card p-5 lg:col-span-3">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-medium text-gray-500">Структура расходов</h2>
          <span class="text-xs text-gray-400">${now.toLocaleDateString('ru-RU', { month: 'long' })}</span>
        </div>
        ${Object.keys(byCat).length
          ? `<div class="relative h-72"><canvas id="fin-chart"></canvas></div>`
          : `<div class="h-72 flex flex-col items-center justify-center text-center text-gray-400">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-12 h-12 mb-3 opacity-50"><path d="M21 12a9 9 0 1 1-9-9v9z"/></svg>
              <p class="text-sm">Нет данных за месяц</p>
            </div>`}
      </div>

      <div class="card p-5 lg:col-span-2">
        <h2 class="text-sm font-medium text-gray-500 mb-4">Добавить расход</h2>
        <form id="add-expense-form" class="space-y-3">
          <div>
            <label class="label">Сумма</label>
            <div class="relative">
              <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm">₽</span>
              <input id="exp-amount" class="input pl-8" type="number" min="1" step="1" placeholder="0" required />

          <div>
            <label class="label">Категория</label>

            }).join('')}
          </ul>`
        : `<div class="p-10 text-center text-sm text-gray-400">Операций пока нет</div>`}
    </div>
  `;

  // default date today
  $('#exp-date').value = now.toISOString().slice(0, 10);

  // category picker
  let selectedCat = categories[0] ? categories[0].name : null;
  const refreshPicker = () => {
    $$('.cat-pill').forEach(p => {
      const active = p.dataset.cat === selectedCat;
      p.style.borderColor = active ? p.dataset.color : '';
      p.style.background = active ? p.dataset.color + '14' : '';

  };

  $$('.cat-pill').forEach(p => p.addEventListener('click', () => { selectedCat = p.dataset.cat; refreshPicker(); }));

  if (Object.keys(byCat).length) {
    const ctx = $('#fin-chart');
    const entries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
    state.financeChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: entries.map(e => e[0]),
        datasets: [{
          data: entries.map(e => e[1]),
          backgroundColor: entries.map(e => (catMap[e[0]] && catMap[e[0]].color) || '#8E8E93'),
          borderWidth: 2, borderColor: '#ffffff', hoverOffset: 8,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '58%',
        plugins: {
          legend: {
            position: 'right',
            labels: { boxWidth: 10, boxHeight: 10, usePointStyle: true, pointStyle: 'circle', padding: 14, font: { size: 12 } }
          },

            backgroundColor: '#1d1d1f', padding: 12, cornerRadius: 12,
            callbacks: {
              label: (c) => {
                const total = c.dataset.data.reduce((a, b) => a + b, 0);
                const pct = total ? ((c.parsed / total) * 100).toFixed(0) : 0;
                return ` ${fmtMoney(c.parsed)} · ${pct}%`;

            }

    if (!selectedCat) { toast('Выберите категорию', 'error'); return; }
    const rec = {
      id: uuid(), userId: state.user.id,
      amount, category: selectedCat,
      date: new Date($('#exp-date').value + 'T12:00:00').toISOString(),
      note: $('#exp-note').value.trim(),
      createdAt: nowISO(),
    };
    await Expenses.save(rec);
    toast('Расход добавлен', 'success');
    renderFinance();
  });

  view.querySelectorAll('[data-del-exp]').forEach(b => b.addEventListener('click', async () => {
    const ok = await confirmDialog({ title: 'Удалить операцию?', message: 'Запись о расходе будет удалена.' });
    if (!ok) return;
    await Expenses.remove(b.dataset.delExp);
    toast('Удалено', 'success');
    renderFinance();
  }));

  $('#manage-categories').addEventListener('click', () => openCategoryManager(categories));
}

    <div class="flex items-center gap-3 rounded-xl border border-black/5 px-3 py-2.5">
      <span class="flex h-8 w-8 items-center justify-center rounded-lg text-base" style="background:${c.color}22;color:${c.color}">${c.icon || '●'}</span>
      <span class="flex-1 text-sm font-medium">${escapeHtml(c.name)}</span>
      <button class="btn btn-ghost !p-1.5 hover:!bg-[#FF3B30]/10 hover:!text-[#FF3B30]" data-del-cat="${c.id}" title="Удалить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>

    <div class="flex items-center justify-between px-5 h-14 border-b border-black/5">

        <p class="label">Новая категория</p>

          <input id="cat-icon" class="input !w-14 text-center" maxlength="2" placeholder="●" />
          <input id="cat-name" class="input flex-1" placeholder="Название" />

        </div>

  `);

  $('#cat-add').addEventListener('click', async () => {
    const name = $('#cat-name').value.trim();
    if (!name) { toast('Введите название', 'error'); return; }
    const exists = categories.some(c => c.name.toLowerCase() === name.toLowerCase());
    if (exists) { toast('Категория уже есть', 'error'); return; }
    const rec = {
      id: uuid(), userId: state.user.id,
      name, icon: $('#cat-icon').value.trim() || '●',
      color: $('#cat-color').value,

const ACCEPTED_IMG = ['image/jpeg','image/png','image/gif','image/webp','image/svg+xml','image/bmp'];

async function renderMedia() {
  const view = $('#view-media');
  const media = await Media.list();

  view.innerHTML = `
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <h2 class="text-lg font-semibold tracking-tight">Галерея</h2>
        <p class="text-sm text-gray-500">${media.length} файл(ов) · ${fmtBytes(media.reduce((s, m) => s + (m.size || 0), 0))}</p>
      </div>
      <label class="btn btn-primary cursor-pointer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Загрузить
        <input id="media-input" type="file" accept="image/*" multiple class="hidden" />
      </label>
    </div>

    ${media.length
      ? `<div id="media-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
          ${media.map(m => {
            const isImg = m.type && m.type.startsWith('image/');
            return `<div class="card overflow-hidden group slide-up" data-media-card="${m.id}">
              <div class="relative aspect-square bg-black/[0.03]">
                ${isImg
                  ? `<img alt="" class="h-full w-full object-cover cursor-pointer" data-preview="${m.id}" />`
                  : `<div class="flex h-full flex-col items-center justify-center text-gray-400">
                       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-8 h-8 mb-1"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>
                       <span class="text-[10px] uppercase">${escapeHtml((m.type || 'file').split('/')[1] || 'file')}</span>
                     </div>`}
                <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition">
                  <button class="btn btn-ghost !bg-white/90" data-preview="${m.id}">Открыть</button>
                </div>
              </div>
              <div class="flex items-center gap-2 px-3 py-2">
                <div class="min-w-0 flex-1">
                  <p class="truncate text-xs font-medium">${escapeHtml(m.filename)}</p>
                  <p class="text-[10px] text-gray-400">${fmtBytes(m.size)}</p>
                </div>
                <button class="btn btn-ghost !p-1 hover:!bg-[#FF3B30]/10 hover:!text-[#FF3B30]" data-del-media="${m.id}" title="Удалить">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-3.5 h-3.5"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
                </button>
              </div>
            </div>`;
          }).join('')}
        </div>`
      : emptyState('Галерея пуста', 'Загрузите изображения — они хранятся прямо в браузере (IndexedDB).', 'Выбрать файлы', () => $('#media-input').click())}
  `;

  // load image thumbnails
  media.forEach(async m => {
    if (!(m.type && m.type.startsWith('image/'))) return;
    const full = await Media.get(m.id);
    if (full && full.blob) {
      const url = URL.createObjectURL(full.blob);
      state.mediaObjectUrls.push(url);
      view.querySelectorAll(`[data-preview="${m.id}"]`).forEach(img => { if (img.tagName === 'IMG') img.src = url; });
    }
  });

  $('#media-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    let count = 0;
    for (const file of files) {
      const isImg = ACCEPTED_IMG.includes(file.type) || file.type.startsWith('image/');
      if (!isImg) { toast(`Пропущен: ${file.name}`, 'error'); continue; }
      const rec = {
        id: uuid(), userId: state.user.id,
        filename: file.name, type: file.type, size: file.size,
        blob: file, createdAt: nowISO(),
      };
      await Media.save(rec);
      count++;
    }
    if (count) toast(`Загружено: ${count}`, 'success');
    renderMedia();
  });

  view.querySelectorAll('[data-preview]').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    const full = await Media.get(b.dataset.preview);
    if (full) openMediaPreview(full);
  }));
  view.querySelectorAll('[data-del-media]').forEach(b => b.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ok = await confirmDialog({ title: 'Удалить файл?', message: 'Файл будет удалён безвозвратно.' });
    if (!ok) return;
    await Media.remove(b.dataset.delMedia);
    toast('Файл удалён', 'success');
    renderMedia();
  }));
}

function openMediaPreview(media) {
  const url = URL.createObjectURL(media.blob);
  state.mediaObjectUrls.push(url);
  openModal(`
    <div class="flex items-center justify-between px-5 h-14 border-b border-black/5">
      <div class="min-w-0">
        <h3 class="truncate font-semibold tracking-tight">${escapeHtml(media.filename)}</h3>
        <p class="text-xs text-gray-400">${fmtBytes(media.size)} · ${fmtDateFull(media.createdAt)}</p>
      </div>
      <button class="btn btn-ghost !p-2" data-close>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="bg-black/[0.03] p-4 flex items-center justify-center" style="max-height:70vh">
      <img src="${url}" alt="${escapeHtml(media.filename)}" class="max-w-full max-h-[60vh] rounded-xl object-contain" />
    </div>
    <div class="grid grid-cols-2 gap-2 p-4 border-t border-black/5">
      <a href="${url}" download="${encodeURIComponent(media.filename)}" class="btn btn-primary">Скачать</a>
      <button class="btn btn-ghost" data-close>Закрыть</button>
    </div>
  `, 'lg');
}

/* =====================================================================
   NAV WIRING
===================================================================== */
function setupNav() {
  $$('.nav-item').forEach(btn => btn.addEventListener('click', () => switchView(btn.dataset.view)));
  $('#menu-btn').addEventListener('click', openMobileSidebar);
  $('#sidebar-overlay').addEventListener('click', closeMobileSidebar);
}

/* =====================================================================
   BOOT
===================================================================== */
async function boot() {
  setupAuthScreen();
  setupNav();
  try {
    await DB.open();
    await ensureAdmin();
    const restored = await restoreSession();
    if (restored) {
      showApp();
    } else {
      $('#auth-screen').classList.remove('hidden');
    }
  } catch (err) {
    console.error(err);
    const view = $('#auth-screen');
    const banner = document.createElement('div');
    banner.className = 'mt-4 rounded-2xl bg-[#FF3B30]/10 px-4 py-3 text-center text-sm text-[#FF3B30]';
    banner.textContent = 'Не удалось открыть локальную базу данных. Проверьте, что браузер поддерживает IndexedDB и не в приватном режиме.';
    view.querySelector('.max-w-sm').appendChild(banner);
  }
}

document.addEventListener('DOMContentLoaded', boot);

})();
</script>
</body>
</html>
